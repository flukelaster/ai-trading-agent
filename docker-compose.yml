version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: goldbot-postgres
    environment:
      POSTGRES_DB: goldbot
      POSTGRES_USER: ${POSTGRES_USER:-goldbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: goldbot-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
